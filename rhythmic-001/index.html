<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vessel Form — RHYTHMIC-001</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #0e0c0a;
      --paper: #faf8f4;
      --rule:  #c8c2b8;
      --muted: #8a847a;
      --faint: #b4aea6;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 48px;
      border-bottom: 1px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      position: relative; z-index: 1;
    }

    header h1 {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    header h1 .breadcrumb {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.14s;
    }

    header h1 .breadcrumb:hover {
      color: var(--ink);
    }

    header h1 .sep {
      color: var(--rule);
      margin: 0 8px;
      font-weight: 300;
    }

    header .ref {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 308px;
      position: relative; z-index: 1;
    }

    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px;
      border-right: 1px solid var(--ink);
    }

    /* ---- Measurements overlay (lower-right of stage) ---- */
    .meas-overlay {
      position: absolute;
      bottom: 28px;
      right: 40px;
      text-align: right;
      pointer-events: none;
    }

    .meas-overlay .meas-row {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 8px;
      padding: 2px 0;
    }

    .meas-overlay .meas-stage {
      font-size: 10px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meas-overlay .meas-dims {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--ink);
    }

    .meas-overlay .meas-pct {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--faint);
      min-width: 34px;
      text-align: right;
    }

    .stage svg {
      display: block;
      /* width/height set by sizeSVG() in JS */
    }

    .panel {
      padding: 28px 32px 32px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .section-gap { margin-top: 24px; }

    /* ---- Vessel tile grid ---- */
    .tile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 32px;
      gap: 3px;
    }

    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid var(--rule);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }

    .tile.solo { grid-column: span 2; }
    .tile input[type=radio] { display: none; }

    .tile-name {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.1s;
    }

    .tile.selected { background: var(--ink); border-color: var(--ink); }
    .tile.selected .tile-name { color: #fff; }

    /* ---- Parameters ---- */
    .params-list { display: flex; flex-direction: column; }

    .param { padding: 12px 0; }

    .param-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .param-name {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .param-val {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      outline: none;
      text-align: right;
      width: 52px;
      padding: 0;
      cursor: text;
    }
    .param-val:focus {
      color: var(--ink);
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      height: 12px;
      background: transparent;
      cursor: pointer;
      outline: none;
      padding: 0;
    }

    input[type=range]::-webkit-slider-runnable-track {
      height: 1px;
      background: var(--rule);
    }

    input[type=range]::-moz-range-track {
      height: 1px;
      background: var(--rule);
      border: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ink);
      cursor: pointer;
      margin-top: -3.5px;
      transition: transform 0.1s;
    }

    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.5); }

    input[type=range]::-moz-range-thumb {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ink);
      border: none;
      cursor: pointer;
    }

    /* ---- Clay selector ---- */
    .clay-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }

    .clay-option {
      padding: 9px 11px;
      border: 1px solid var(--rule);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }

    .clay-option.solo { grid-column: span 2; }
    .clay-option input[type=radio] { display: none; }

    .clay-name {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 2px;
      transition: color 0.1s;
    }

    .clay-sub {
      font-size: 10px;
      letter-spacing: 0.07em;
      color: var(--faint);
      transition: color 0.1s;
    }

    .clay-shrink {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--faint);
      margin-top: 2px;
      transition: color 0.1s;
    }

    .clay-option.selected              { background: var(--ink); border-color: var(--ink); }
    .clay-option.selected .clay-name   { color: #fff; }
    .clay-option.selected .clay-sub    { color: rgba(255,255,255,0.6); }
    .clay-option.selected .clay-shrink { color: rgba(255,255,255,0.6); }

    /* ---- Measurements ---- */
    .meas-table { border-top: 1px solid var(--rule); }

    .meas-row {
      display: grid;
      grid-template-columns: 60px 1fr 30px;
      align-items: baseline;
      gap: 6px;
      padding: 9px 0;
      border-bottom: 1px solid var(--rule);
    }

    .meas-stage {
      font-size: 10px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meas-dims {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--ink);
    }

    .meas-pct {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--faint);
      text-align: right;
    }

    /* ---- Form ---- */
    .form-section {
      margin-top: 22px;
      padding-top: 18px;
    }

    .form-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .form-name { font-size: 10px; letter-spacing: 0.02em; }
    .meas-overlay .form-name { margin-bottom: 8px; }

    /* ---- Glaze selector ---- */
    .glaze-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
    }

    .glaze-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--rule);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }

    .glaze-option.solo { grid-column: span 2; }
    .glaze-option input[type=radio] { display: none; }

    .glaze-swatch {
      flex-shrink: 0;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.1);
    }

    .glaze-name {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--faint);
      transition: color 0.1s;
    }

    .glaze-option.selected { border-color: var(--ink); }
    .glaze-option.selected .glaze-name { color: var(--ink); }

    footer {
      padding: 16px 48px;
      border-top: 1px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative; z-index: 1;
    }

    footer span {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .layout {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }
      .stage {
        flex: 0 0 60%;
        border-right: none;
        border-bottom: 1px solid var(--ink);
        padding: 24px;
      }
      .panel { flex: 1; overflow-y: auto; min-height: 0; padding: 24px; }
      header, footer { padding: 20px 24px; flex-shrink: 0; }

      /* Larger tap target for sliders */
      input[type=range] { height: 28px; }
      input[type=range]::-webkit-slider-thumb {
        width: 18px; height: 18px;
        margin-top: -8.5px;
      }
      input[type=range]::-moz-range-thumb {
        width: 18px; height: 18px;
      }

      /* Larger, darker param value readouts */
      .param-val {
        font-size: 13px;
        color: var(--ink);
        width: 60px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1><a class="breadcrumb" href="../">Rhythmic</a><span class="sep">/</span>Vessel Form Generator</h1>
  </header>

  <div class="layout">
    <div class="stage">
      <svg id="svg" viewBox="0 0 400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="pot" stroke="#0e0c0a" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round" fill="none" vector-effect="non-scaling-stroke"/>
      </svg>
      <div class="meas-overlay">
        <div class="form-name" id="form-name">—</div>
        <div class="meas-row">
          <span class="meas-stage">Wet</span>
          <span class="meas-dims" id="m-wet">—</span>
        </div>
        <div class="meas-row">
          <span class="meas-stage">Bone dry</span>
          <span class="meas-dims" id="m-dry">—</span>
          <span class="meas-pct" id="p-dry">—</span>
        </div>
        <div class="meas-row">
          <span class="meas-stage">Fired</span>
          <span class="meas-dims" id="m-fired">—</span>
          <span class="meas-pct" id="p-fired">—</span>
        </div>
      </div>
    </div>

    <div class="panel">

      <div class="section-label">Vessel</div>
      <div class="tile-grid" id="vessel-grid"></div>

      <div class="section-label section-gap">Parameters</div>
      <div class="params-list">
        <div class="param" id="param-height">
          <div class="param-row"><span class="param-name">Height</span><input type="text" class="param-val" id="v-height" value="—"></div>
          <input type="range" id="s-height" min="18" max="94" value="66">
        </div>
        <div class="param" id="param-width">
          <div class="param-row"><span class="param-name">Width</span><input type="text" class="param-val" id="v-width" value="—"></div>
          <input type="range" id="s-width" min="12" max="92" value="56">
        </div>
        <div class="param" id="param-rim">
          <div class="param-row"><span class="param-name">Rim</span><input type="text" class="param-val" id="v-rim" value="—"></div>
          <input type="range" id="s-rim" min="6" max="88" value="36">
        </div>
        <div class="param" id="param-neck">
          <div class="param-row"><span class="param-name">Neck</span><input type="text" class="param-val" id="v-neck" value="—"></div>
          <input type="range" id="s-neck" min="6" max="78" value="26">
        </div>
        <div class="param" id="param-belly">
          <div class="param-row"><span class="param-name">Body</span><input type="text" class="param-val" id="v-belly" value="—"></div>
          <input type="range" id="s-belly" min="22" max="68" value="42">
        </div>
        <div class="param" id="param-base">
          <div class="param-row"><span class="param-name">Foot</span><input type="text" class="param-val" id="v-base" value="—"></div>
          <input type="range" id="s-base" min="4" max="52" value="20">
        </div>
      </div>

      <div class="section-label section-gap">Clay Type</div>
      <div class="clay-grid" id="clay-grid"></div>

      <div class="section-label section-gap">Glaze</div>
      <div class="glaze-grid" id="glaze-grid"></div>

    </div>
  </div>

  <footer>
    <span id="footer-clay">—</span>
  </footer>

  <script>
    // ---- Paper grain ----
    (function () {
      const sz = 256, c = document.createElement('canvas');
      c.width = c.height = sz;
      const ctx = c.getContext('2d'), img = ctx.createImageData(sz, sz);
      for (let i = 0; i < img.data.length; i += 4) {
        const v = Math.random() * 255 | 0;
        img.data[i] = img.data[i+1] = img.data[i+2] = v;
        img.data[i+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      const el = document.createElement('div');
      el.setAttribute('aria-hidden', 'true');
      el.style.cssText =
        'position:fixed;inset:0;pointer-events:none;z-index:9999;' +
        'opacity:0.028;mix-blend-mode:multiply;' +
        `background:url(${c.toDataURL()});background-size:256px 256px;`;
      document.body.appendChild(el);
    })();

    // ---- Constants ----
    const CX     = 200;
    const BOTTOM = 482;
    const MAX_H  = BOTTOM - 38;
    const MAX_R  = 152;
    const SCALE  = 18 / MAX_H;

    const $  = id => document.getElementById(id);
    const mx = x  => 2 * CX - x;

    // params: which sliders are relevant and visible for this vessel type
    const VESSELS = [
      { id: 'cylinder', name: 'Cylinder', mode: 'mug', params: ['height','width','base'],
        sliderOverrides: { height: { min: 14, max: 35 }, width: { min: 23, max: 41 }, base: { min: 14, max: 28 } },
        p: { height:25, width:30, rim:30, neck:28, belly:42, base:25 } },
      { id: 'bowl',  name: 'Bowl',  mode: 'bowl',   params: ['height','width','belly','base'],
        sliderOverrides: { height: { min: 9, max: 38 }, width: { min: 37, max: 92 }, base: { min: 14, max: 41 } },
        p: { height:22, width:64, rim:64, neck:62, belly:42, base:28 } },
      { id: 'plate', name: 'Plate', mode: 'plate',  params: ['height','width'],
        sliderOverrides: { height: { min: 6, max: 13 } },
        p: { height:7, width:90, rim:90, neck:88, belly:28, base:41 } },
      { id: 'vase',  name: 'Vase',  mode: 'vessel', params: ['height','width','rim','neck','belly','base'],
        p: { height:63, width:41, rim:23, neck:19, belly:42, base:19 } },
    ];

    const ALL_PARAMS = ['height','width','rim','neck','belly','base'];
    let selectedVessel = null;

    // Build vessel tiles
    const vGrid = $('vessel-grid');
    VESSELS.forEach((v, i) => {
      const el = document.createElement('label');
      el.className = 'tile' + (i === VESSELS.length - 1 && VESSELS.length % 2 !== 0 ? ' solo' : '');
      el.innerHTML = `<input type="radio" name="vessel" value="${v.id}"><span class="tile-name">${v.name}</span>`;
      vGrid.appendChild(el);
    });

    const SLIDER_DEFAULTS = {
      height: { min: 18, max: 94 },
      width:  { min: 12, max: 92 },
      rim:    { min: 6,  max: 88 },
      neck:   { min: 6,  max: 78 },
      belly:  { min: 22, max: 68 },
      base:   { min: 4,  max: 52 },
    };

    vGrid.addEventListener('change', e => {
      const v = VESSELS.find(v => v.id === e.target.value);
      if (!v) return;
      selectedVessel = v;

      document.querySelectorAll('#vessel-grid .tile').forEach(o =>
        o.classList.toggle('selected', o.querySelector('input').value === v.id)
      );

      // Reset slider mins/maxes to defaults, then apply per-vessel overrides
      ALL_PARAMS.forEach(p => {
        const sl = $('s-' + p);
        if (!sl || !SLIDER_DEFAULTS[p]) return;
        sl.min = SLIDER_DEFAULTS[p].min;
        sl.max = SLIDER_DEFAULTS[p].max;
      });
      if (v.sliderOverrides) {
        Object.entries(v.sliderOverrides).forEach(([k, ov]) => {
          const sl = $('s-' + k);
          if (!sl) return;
          if (ov.min !== undefined) sl.min = ov.min;
          if (ov.max !== undefined) sl.max = ov.max;
        });
      }

      // Snap all sliders to presets
      Object.entries(v.p).forEach(([k, val]) => {
        const sl = $('s-' + k);
        if (sl) sl.value = val;
      });

      // Show only relevant params
      ALL_PARAMS.forEach(p => {
        $('param-' + p).style.display = v.params.includes(p) ? '' : 'none';
      });

      draw();
    });

    // ---- Clay data ----
    // color: fired body color (unglazed); category: affects how glazes render
    const CLAYS = [
      { id: 'earthenware', name: 'Earthenware', sub: 'Cone 06–1',  temp: '1830–2100°F', dryShrink: 0.05, fireShrink: 0.03, color: '#C8845A', category: 'warm'    },
      { id: 'terracotta',  name: 'Terracotta',  sub: 'Cone 06–04', temp: '1830–1940°F', dryShrink: 0.05, fireShrink: 0.03, color: '#C05040', category: 'warm'    },
      { id: 'sw45',        name: 'Stoneware',   sub: 'Cone 4–5',   temp: '2167–2232°F', dryShrink: 0.065,fireShrink: 0.045,color: '#C4AE88', category: 'mid'     },
      { id: 'sw6',         name: 'Stoneware',   sub: 'Cone 6',     temp: '2232°F',      dryShrink: 0.07, fireShrink: 0.05, color: '#C0B090', category: 'mid'     },
      { id: 'speckled',    name: 'Speckled',    sub: 'Cone 6',     temp: '2232°F',      dryShrink: 0.07, fireShrink: 0.05, color: '#C8B898', category: 'mid'     },
      { id: 'sw10',        name: 'Stoneware',   sub: 'Cone 10',    temp: '2345°F',      dryShrink: 0.07, fireShrink: 0.06, color: '#B0A080', category: 'mid'     },
      { id: 'iron',        name: 'Iron Stoneware', sub: 'Cone 6–10', temp: '2232–2345°F', dryShrink: 0.07, fireShrink: 0.06, color: '#6A5040', category: 'warm'  },
      { id: 'p6',          name: 'Porcelain',   sub: 'Cone 6',     temp: '2232°F',      dryShrink: 0.08, fireShrink: 0.06, color: '#ECE9E0', category: 'light'   },
      { id: 'p10',         name: 'Porcelain',   sub: 'Cone 10',    temp: '2345°F',      dryShrink: 0.09, fireShrink: 0.08, color: '#E8E4D8', category: 'light'   },
      { id: 'raku',        name: 'Raku',        sub: 'Cone 06',    temp: '~1830°F',     dryShrink: 0.04, fireShrink: 0.03, color: '#4E3E2E', category: 'special' },
    ];

    // Glaze color per clay body category
    // light = porcelain, mid = stoneware, warm = earthenware/terracotta, special = raku
    const GLAZE_MATRIX = {
      white:    { light: '#F0EDE6', mid: '#EAE2D0', warm: '#E0D0B8', special: '#DDD4C0' },
      celadon:  { light: '#9ECAB4', mid: '#90BA9E', warm: '#7AA07E', special: '#7898A0' },
      ash:      { light: '#BAB098', mid: '#A89A72', warm: '#9A8658', special: '#887850' },
      cobalt:   { light: '#2E68C0', mid: '#2A5CA8', warm: '#243E78', special: '#243060' },
      slate:    { light: '#7890A8', mid: '#68809E', warm: '#5C6878', special: '#5A6070' },
      sage:     { light: '#8CB09E', mid: '#7CA088', warm: '#6A8A62', special: '#608070' },
      copper:   { light: '#3A9870', mid: '#348860', warm: '#2A6848', special: '#306858' },
      ironred:  { light: '#CC6040', mid: '#B85038', warm: '#9A3820', special: '#8A3028' },
      tenmoku:  { light: '#3C2418', mid: '#301A10', warm: '#28140C', special: '#201008' },
      oatmeal:  { light: '#D8C890', mid: '#C4B478', warm: '#AC9658', special: '#A08450' },
      midnight: { light: '#1E2E48', mid: '#1A2840', warm: '#161E34', special: '#101828' },
    };

    let selectedClay = CLAYS[2];

    const cGrid = $('clay-grid');
    CLAYS.forEach((clay, i) => {
      const tot = (1 - (1 - clay.dryShrink) * (1 - clay.fireShrink)) * 100;
      const el = document.createElement('label');
      el.className = 'clay-option' +
        (clay.id === selectedClay.id ? ' selected' : '') +
        (i === CLAYS.length - 1 && CLAYS.length % 2 !== 0 ? ' solo' : '');
      el.innerHTML =
        `<input type="radio" name="clay" value="${clay.id}"${clay.id === selectedClay.id ? ' checked' : ''}>` +
        `<div class="clay-name">${clay.name}</div>` +
        `<div class="clay-sub">${clay.sub}</div>` +
        `<div class="clay-shrink">−${tot.toFixed(1)}% total</div>`;
      cGrid.appendChild(el);
    });

    cGrid.addEventListener('change', e => {
      const clay = CLAYS.find(c => c.id === e.target.value);
      if (!clay) return;
      selectedClay = clay;
      document.querySelectorAll('.clay-option').forEach(o =>
        o.classList.toggle('selected', o.querySelector('input').value === clay.id)
      );
      draw();
    });

    // ---- Shape builders ----

    // Mug: clean near-cylinder with slight taper and concave wall
    function buildMugPath({ H, maxR, baseR }) {
      const yBottom = BOTTOM, yTop = BOTTOM - H;
      const lipH = Math.max(5, H * 0.05);
      const yLip = yTop + lipH;

      // Organic S-curve: centrifugal flare at base, hand-compression taper near rim
      const cp1 = [CX + baseR + (maxR - baseR) * 0.14, yBottom - H * 0.28];
      const cp2 = [CX + maxR  - (maxR - baseR) * 0.10, yLip   + H * 0.28];

      return (
        `M ${CX + baseR} ${yBottom} ` +
        `C ${cp1[0]} ${cp1[1]}, ${cp2[0]} ${cp2[1]}, ${CX + maxR} ${yLip} ` +
        `L ${CX + maxR} ${yTop} ` +
        `L ${mx(CX + maxR)} ${yTop} ` +
        `L ${mx(CX + maxR)} ${yLip} ` +
        `C ${mx(cp2[0])} ${cp2[1]}, ${mx(cp1[0])} ${cp1[1]}, ${mx(CX + baseR)} ${yBottom} Z`
      );
    }

    // Bowl: narrow foot, walls sweep outward — parabolic/catenary profile
    // cp1 purely vertical at foot (how clay naturally rises from the wheel);
    // cp2 controls rim opening angle via bN: low bN = wide/open rim, high bN = steep/deep rim
    function buildBowlPath({ H, maxR, baseR, bN }) {
      const yBottom = BOTTOM, yTop = BOTTOM - H;
      const lipH = Math.max(5, H * 0.055);
      const yLip = yTop + lipH;

      // Near-vertical departure at foot; walls stay steep for lower 50–68% of height
      const cp1 = [CX + baseR + (maxR - baseR) * 0.03, yBottom - H * (0.50 + bN * 0.18)];
      // Rim tangent: angled outward (not vertical) — open bowl ~5°, deep bowl ~28° from horizontal
      const cp2 = [CX + maxR - (maxR - baseR) * (0.40 - bN * 0.32), yLip + H * bN * 0.08];

      return (
        `M ${CX + baseR} ${yBottom} ` +
        `C ${cp1[0]} ${cp1[1]}, ${cp2[0]} ${cp2[1]}, ${CX + maxR} ${yLip} ` +
        `L ${CX + maxR} ${yTop} ` +
        `L ${mx(CX + maxR)} ${yTop} ` +
        `L ${mx(CX + maxR)} ${yLip} ` +
        `C ${mx(cp2[0])} ${cp2[1]}, ${mx(cp1[0])} ${cp1[1]}, ${mx(CX + baseR)} ${yBottom} Z`
      );
    }

    // Plate: foot ring, flat floor, curved wall, vertical rim lip
    function buildPlatePath({ H, maxR, baseR }) {
      const yBottom = BOTTOM, yTop = BOTTOM - H;
      const floorR  = maxR * 0.66;
      const footR   = Math.min(baseR, floorR * 0.82);  // foot ring can never exceed floor
      const yWall   = yTop + H * 0.48;

      // Horizontal tangent at floor edge → vertical tangent at rim base
      const wcp1 = [CX + floorR + (maxR - floorR) * 0.55, yBottom];
      const wcp2 = [CX + maxR,                              yWall + H * 0.09];

      return (
        `M ${CX + footR} ${yBottom} ` +
        `L ${CX + floorR} ${yBottom} ` +
        `C ${wcp1[0]} ${wcp1[1]}, ${wcp2[0]} ${wcp2[1]}, ${CX + maxR} ${yWall} ` +
        `L ${CX + maxR} ${yTop} ` +
        `L ${mx(CX + maxR)} ${yTop} ` +
        `L ${mx(CX + maxR)} ${yWall} ` +
        `C ${mx(wcp2[0])} ${wcp2[1]}, ${mx(wcp1[0])} ${wcp1[1]}, ${mx(CX + floorR)} ${yBottom} ` +
        `L ${mx(CX + footR)} ${yBottom} Z`
      );
    }

    // General vessel: belly, neck, rim transitions
    function buildVesselPath({ H, maxR, neckR, rimR, baseR, bN }) {
      const yBottom    = BOTTOM;
      const yTop       = BOTTOM - H;
      const rimH       = Math.max(14, H * 0.075);
      const yRimBottom = yTop + rimH;
      const yBelly     = BOTTOM - bN * H;
      const neckFrac   = Math.max(bN + 0.14, 0.76);
      const yNeck      = Math.max(yRimBottom + 8, BOTTOM - neckFrac * H);

      const A_s  = [CX + baseR, yBottom];
      // Vertical departure at foot (clay rises straight from the wheel); pulls toward belly axis
      const A_c1 = [CX + baseR, yBottom - H * 0.20];
      const A_c2 = [CX + maxR,  yBelly  + (yBottom - yBelly) * 0.28];
      const A_e  = [CX + maxR,  yBelly];
      // Pronounced shoulder: control points held further from belly/neck for decisive S-curve
      const B_c1 = [CX + maxR,  yBelly - (yBelly - yNeck) * 0.30];
      const B_c2 = [CX + neckR, yNeck  + (yBelly - yNeck) * 0.36];
      const B_e  = [CX + neckR, yNeck];
      // Smooth neck-to-rim with slight flare potential; larger fractions = more organic transition
      const C_c1 = [CX + neckR, yNeck      - (yNeck - yRimBottom) * 0.24];
      const C_c2 = [CX + rimR,  yRimBottom + (yNeck - yRimBottom) * 0.44];
      const C_e  = [CX + rimR,  yRimBottom];
      const D_e  = [CX + rimR,  yTop];

      return (
        `M ${A_s[0]} ${A_s[1]} ` +
        `C ${A_c1[0]} ${A_c1[1]}, ${A_c2[0]} ${A_c2[1]}, ${A_e[0]} ${A_e[1]} ` +
        `C ${B_c1[0]} ${B_c1[1]}, ${B_c2[0]} ${B_c2[1]}, ${B_e[0]} ${B_e[1]} ` +
        `C ${C_c1[0]} ${C_c1[1]}, ${C_c2[0]} ${C_c2[1]}, ${C_e[0]} ${C_e[1]} ` +
        `L ${D_e[0]} ${D_e[1]} ` +
        `L ${mx(D_e[0])} ${yTop} ` +
        `L ${mx(C_e[0])} ${yRimBottom} ` +
        `C ${mx(C_c2[0])} ${C_c2[1]}, ${mx(C_c1[0])} ${C_c1[1]}, ${mx(B_e[0])} ${B_e[1]} ` +
        `C ${mx(B_c2[0])} ${B_c2[1]}, ${mx(B_c1[0])} ${B_c1[1]}, ${mx(A_e[0])} ${A_e[1]} ` +
        `C ${mx(A_c2[0])} ${A_c2[1]}, ${mx(A_c1[0])} ${A_c1[1]}, ${mx(A_s[0])} ${A_s[1]} Z`
      );
    }

    // ---- Draw ----
    const sliders  = {
      height: $('s-height'), width:  $('s-width'),  belly: $('s-belly'),
      neck:   $('s-neck'),   rim:    $('s-rim'),    base:  $('s-base'),
    };
    const displays = {
      height: $('v-height'), width:  $('v-width'),  belly: $('v-belly'),
      neck:   $('v-neck'),   rim:    $('v-rim'),    base:  $('v-base'),
    };

    function draw() {
      const hN    = sliders.height.value / 100;
      const wN    = sliders.width.value  / 100;
      const bN    = sliders.belly.value  / 100;
      const neN   = sliders.neck.value   / 100;
      const riN   = sliders.rim.value    / 100;
      const baN   = sliders.base.value   / 100;

      // Compute shrinkage first so param readouts show fired dimensions
      const dF     = 1 - selectedClay.dryShrink;
      const fF     = 1 - selectedClay.fireShrink;
      const shrink = dF * fF;

      const fd = n => (n * MAX_R * 2 * SCALE * shrink).toFixed(1) + '"';
      displays.height.value = (hN * 18 * shrink).toFixed(1) + '"';
      displays.width.value  = fd(wN);
      displays.rim.value    = fd(riN);
      displays.neck.value   = fd(neN);
      displays.belly.value  = Math.round(bN * 100) + '%';
      displays.base.value   = fd(baN);

      const H     = hN  * MAX_H;
      const maxR  = wN  * MAX_R;
      const neckR = neN * MAX_R;
      const rimR  = riN * MAX_R;
      const baseR = baN * MAX_R;

      const mode = selectedVessel ? selectedVessel.mode : 'vessel';
      let d;
      if      (mode === 'mug')   d = buildMugPath({ H, maxR, baseR });
      else if (mode === 'bowl')  d = buildBowlPath({ H, maxR, baseR, bN });
      else if (mode === 'plate') d = buildPlatePath({ H, maxR, baseR });
      else                       d = buildVesselPath({ H, maxR, neckR, rimR, baseR, bN });

      $('pot').setAttribute('d', d);


      // Fit the SVG viewBox tightly around the vessel so flexbox centering is accurate
      const outerR  = (mode === 'vessel') ? Math.max(maxR, rimR) : maxR;
      const vbPad   = 22;
      const vbLeft  = CX - outerR - vbPad;
      const vbTop   = BOTTOM - H  - vbPad;
      const vbW     = outerR * 2  + vbPad * 2;
      const vbH     = H           + vbPad * 2;
      $('svg').setAttribute('viewBox', `${vbLeft} ${vbTop} ${vbW} ${vbH}`);
      $('svg')._vbW = vbW;
      $('svg')._vbH = vbH;
      sizeSVG();

      // Shrinkage overlay measurements
      const wetH = H * SCALE, wetW = maxR * 2 * SCALE;

      $('m-wet').textContent   = `${wetH.toFixed(1)}" h  ×  ${wetW.toFixed(1)}" w`;
      $('m-dry').textContent   = `${(wetH*dF).toFixed(1)}" h  ×  ${(wetW*dF).toFixed(1)}" w`;
      $('m-fired').textContent = `${(wetH*dF*fF).toFixed(1)}" h  ×  ${(wetW*dF*fF).toFixed(1)}" w`;
      $('p-dry').textContent   = `−${(selectedClay.dryShrink*100).toFixed(1)}%`;
      $('p-fired').textContent = `−${((1-dF*fF)*100).toFixed(1)}%`;

      // Form descriptor — named modes use their vessel name directly
      let form;
      if      (mode === 'mug')   form = 'Cylinder';
      else if (mode === 'bowl')  form = 'Bowl';
      else if (mode === 'plate') form = 'Plate';
      else if (neckR < MAX_R * 0.18 && maxR > MAX_R * 0.55) form = 'Amphora';
      else if (neckR > MAX_R * 0.60)                         form = 'Wide Vessel';
      else if (H > MAX_H * 0.72 && maxR < MAX_R * 0.35)     form = 'Tall Column';
      else if (rimR > neckR * 1.5 && rimR > MAX_R * 0.4)    form = 'Flared Vase';
      else if (bN < 0.32)                                    form = 'High-shouldered';
      else if (bN > 0.58)                                    form = 'Low-belly Form';
      else                                                   form = 'Classic Vessel';

      $('form-name').textContent = form;
      $('footer-clay').textContent = `${selectedClay.name} · ${selectedClay.sub} · ${selectedClay.temp}`;

      // Fill: glaze-over-clay matrix, or bare clay body color
      const pot = $('pot');
      let fillHex     = null;
      let fillOpacity = 0.48;
      if (selectedGlaze && selectedGlaze.id !== 'none') {
        fillHex     = (GLAZE_MATRIX[selectedGlaze.id] || {})[selectedClay.category] || selectedGlaze.hex;
        fillOpacity = 0.40;
      } else {
        fillHex = selectedClay.color;
      }
      if (fillHex) {
        const r = parseInt(fillHex.slice(1,3), 16);
        const g = parseInt(fillHex.slice(3,5), 16);
        const b = parseInt(fillHex.slice(5,7), 16);
        pot.setAttribute('fill', `rgba(${r},${g},${b},${fillOpacity})`);
      } else {
        pot.setAttribute('fill', 'none');
      }
    }

    // ---- Glaze data ----
    const GLAZES = [
      { id: 'none',     name: 'None',        hex: null },
      { id: 'white',    name: 'Liner White',  hex: '#F2EFE8' },
      { id: 'celadon',  name: 'Celadon',      hex: '#94BBA8' },
      { id: 'ash',      name: 'Ash',          hex: '#B0A48A' },
      { id: 'cobalt',   name: 'Cobalt',       hex: '#2E5294' },
      { id: 'slate',    name: 'Slate',        hex: '#6B7E8C' },
      { id: 'sage',     name: 'Sage',         hex: '#7A9B72' },
      { id: 'copper',   name: 'Copper Green', hex: '#3A7B5C' },
      { id: 'ironred',  name: 'Iron Red',     hex: '#B84E2E' },
      { id: 'tenmoku',  name: 'Tenmoku',      hex: '#3A2416' },
      { id: 'oatmeal',  name: 'Oatmeal',      hex: '#C8BA96' },
      { id: 'midnight', name: 'Midnight',     hex: '#1C2B42' },
    ];

    let selectedGlaze = GLAZES[0];

    const gGrid = $('glaze-grid');
    GLAZES.forEach((glaze, i) => {
      const el = document.createElement('label');
      el.className = 'glaze-option' +
        (glaze.id === selectedGlaze.id ? ' selected' : '') +
        (i === GLAZES.length - 1 && GLAZES.length % 2 !== 0 ? ' solo' : '');
      const swatchStyle = glaze.hex
        ? `background:${glaze.hex};`
        : 'background:#fff;border:1px dashed var(--rule);';
      el.innerHTML =
        `<input type="radio" name="glaze" value="${glaze.id}"${glaze.id === selectedGlaze.id ? ' checked' : ''}>` +
        `<span class="glaze-swatch" style="${swatchStyle}"></span>` +
        `<span class="glaze-name">${glaze.name}</span>`;
      gGrid.appendChild(el);
    });

    gGrid.addEventListener('change', e => {
      const glaze = GLAZES.find(g => g.id === e.target.value);
      if (!glaze) return;
      selectedGlaze = glaze;
      document.querySelectorAll('.glaze-option').forEach(o =>
        o.classList.toggle('selected', o.querySelector('input').value === glaze.id)
      );
      draw();
    });

    // ---- Param number input: reverse-map fired dim → slider ----
    function firedToSlider(paramId, rawVal) {
      const v = parseFloat(rawVal);
      if (isNaN(v) || v <= 0) return null;
      const shrink = (1 - selectedClay.dryShrink) * (1 - selectedClay.fireShrink);
      if (paramId === 'height') return v / (18 * shrink) * 100;
      if (paramId === 'belly')  return v;  // value IS the percentage
      return v / (MAX_R * 2 * SCALE * shrink) * 100;
    }

    Object.entries(displays).forEach(([id, inp]) => {
      inp.addEventListener('focus', () => { inp.select(); });
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
      inp.addEventListener('change', () => {
        const sl = sliders[id];
        if (!sl) return;
        const raw = firedToSlider(id, inp.value);
        if (raw === null) { draw(); return; }
        sl.value = Math.max(+sl.min, Math.min(+sl.max, Math.round(raw)));
        draw();
      });
    });

    // ---- Size SVG to always fit stage without clipping ----
    function sizeSVG() {
      const svgEl   = $('svg');
      if (!svgEl._vbW || !svgEl._vbH) return;
      const stageEl = document.querySelector('.stage');
      const mobile  = window.innerWidth <= 720;
      const pad     = mobile ? 24 : 64;
      const availW  = stageEl.clientWidth  - pad * 2;
      const availH  = stageEl.clientHeight - pad * 2;
      if (availW <= 0 || availH <= 0) return;
      const aspect  = svgEl._vbW / svgEl._vbH;

      // Desktop: cap width at 340px; mobile: 55% of available width
      let w = mobile ? availW * 0.55 : Math.min(340, availW);
      let h = w / aspect;
      // If too tall, constrain by height instead
      if (h > availH) { h = availH; w = h * aspect; }

      svgEl.style.width  = Math.round(w) + 'px';
      svgEl.style.height = Math.round(h) + 'px';
    }
    window.addEventListener('resize', sizeSVG);

    Object.values(sliders).forEach(s => s.addEventListener('input', draw));
    draw();
  </script>

</body>
</html>
