<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHYTHMIC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #0e0c0a;
      --paper: #faf8f4;
      --rule:  #c8c2b8;
      --muted: #8a847a;
      --faint: #b4aea6;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 48px;
      border-bottom: 1px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    header h1 {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    header .ref {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    main {
      flex: 1;
      padding: 64px 48px;
      max-width: 900px;
    }

    .index-label {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 32px;
    }

    .project-list {
      display: flex;
      flex-direction: column;
    }

    .project-row {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      align-items: baseline;
      gap: 0 24px;
      padding: 24px 0;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
      cursor: pointer;
    }

    .project-row:first-child {
      border-top: 1px solid var(--rule);
    }

    .project-row:hover .project-name {
      letter-spacing: 0.20em;
    }

    .project-row:hover .project-arrow {
      transform: translateX(4px);
    }

    .project-num {
      font-size: 9px;
      letter-spacing: 0.20em;
      color: var(--faint);
      font-weight: 400;
      padding-top: 2px;
    }

    .project-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .project-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: letter-spacing 0.18s ease;
    }

    .project-desc {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .project-arrow {
      font-size: 14px;
      color: var(--faint);
      transition: transform 0.18s ease, color 0.12s;
      align-self: center;
    }

    .project-row:hover .project-arrow {
      color: var(--ink);
    }

    /* grain overlay — matches pottery tool */
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.028;
      mix-blend-mode: multiply;
      z-index: 100;
    }

    @media (max-width: 720px) {
      header { padding: 20px 24px; }
      main { padding: 40px 24px; }
      .project-row { grid-template-columns: 44px 1fr auto; gap: 0 16px; padding: 20px 0; }
    }
  </style>
</head>
<body>
  <canvas id="grain"></canvas>

  <header>
    <h1>RHYTHMIC</h1>
    <span class="ref">rhythmiccreative.com</span>
  </header>

  <main>
    <p class="index-label">Index</p>
    <div class="project-list">

      <a class="project-row" href="./rhythmic-001/">
        <span class="project-num">001</span>
        <div class="project-body">
          <span class="project-name">Vessel Form</span>
          <span class="project-desc">Pottery design tool — clay bodies, shrinkage &amp; glaze</span>
        </div>
        <span class="project-arrow">→</span>
      </a>

    </div>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById('grain');
      const ctx    = canvas.getContext('2d');
      function makeGrain() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        const img = ctx.createImageData(canvas.width, canvas.height);
        for (let i = 0; i < img.data.length; i += 4) {
          const v = Math.random() * 255 | 0;
          img.data[i] = img.data[i+1] = img.data[i+2] = v;
          img.data[i+3] = 255;
        }
        ctx.putImageData(img, 0, 0);
      }
      makeGrain();
      window.addEventListener('resize', makeGrain);
    })();
  </script>
</body>
</html>
